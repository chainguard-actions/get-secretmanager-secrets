name: Test basic secrets input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test action fails with auth error (not input error)
        id: action
        uses: .
        with:
          secrets: |-
            mytoken:my-project/my-secret
          min_mask_length: '4'
          export_to_environment: 'false'
          encoding: 'utf8'
        continue-on-error: true
      - name: Assert action failed due to auth/credential error, not input validation
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail because there are no GCP credentials,
          # not because the 'secrets' input was missing or invalid.
          # A failure here confirms the input was accepted and the action
          # attempted to contact Secret Manager.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail due to missing GCP credentials, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action failed as expected (no GCP credentials in test env)"
