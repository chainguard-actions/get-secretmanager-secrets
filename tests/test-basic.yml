name: Test basic usage - secrets input coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test action invocation with secrets input (expect failure without credentials)
        id: action
        uses: .
        with:
          secrets: |-
            MY_SECRET:my-project/my-secret
        continue-on-error: true

      - name: Assert action was invoked (outcome is either success or failure, not skipped)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
